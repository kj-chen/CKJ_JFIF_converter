<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JFIF 影像批量轉換器</title>
    <!-- 使用 Tailwind CSS 進行快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 JSZip 庫用於批量打包下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .drop-zone--over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<div class="max-w-4xl mx-auto py-10 px-4">
    <!-- 標題區 -->
    <header class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-2">JFIF 影像批量轉換器</h1>
        <p class="text-gray-600">快速將 JFIF 轉換為 JPG、PNG 或 WebP，支援批次處理與下載。</p>
    </header>

    <!-- 控制面板 -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            <!-- 格式選擇 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">目標格式：</label>
                <select id="targetFormat" class="w-full border-gray-300 border rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="image/jpeg">JPEG (.jpg)</option>
                    <option value="image/png">PNG (.png)</option>
                    <option value="image/webp">WebP (.webp)</option>
                </select>
            </div>
            <!-- 下載全部按鈕 -->
            <div class="flex justify-end">
                <button id="downloadAllBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition hidden">
                    下載全部 (ZIP)
                </button>
            </div>
        </div>
    </div>

    <!-- 上傳區 -->
    <div id="dropZone" class="border-4 border-dashed border-gray-200 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-400 transition mb-8 bg-white">
        <div class="flex flex-col items-center">
            <svg class="w-16 h-16 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <p class="text-xl text-gray-700">點擊或將 JFIF 檔案拖曳到此處</p>
            <p class="text-sm text-gray-500 mt-2">支援批次選擇多個檔案</p>
            <input type="file" id="fileInput" multiple accept=".jfif,image/jfif" class="hidden">
        </div>
    </div>

    <!-- 檔案列表 -->
    <div id="fileList" class="space-y-4">
        <!-- 檔案項目會動態生成於此 -->
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const targetFormatSelect = document.getElementById('targetFormat');
    const downloadAllBtn = document.getElementById('downloadAllBtn');

    let filesArray = [];

    // 點擊觸發選擇
    dropZone.addEventListener('click', () => fileInput.click());

    // 檔案選取處理
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    // 拖放處理
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drop-zone--over');
    });

    ['dragleave', 'dragend'].forEach(type => {
        dropZone.addEventListener(type, () => dropZone.classList.remove('drop-zone--over'));
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drop-zone--over');
        handleFiles(e.dataTransfer.files);
    });

    // 處理檔案的核心邏輯
    async function handleFiles(files) {
        const selectedFiles = Array.from(files);
        if (selectedFiles.length === 0) return;

        // 顯示下載全部按鈕
        downloadAllBtn.classList.remove('hidden');

        for (const file of selectedFiles) {
            const fileId = Math.random().toString(36).substr(2, 9);
            const targetFormat = targetFormatSelect.value;
            const extension = targetFormat.split('/')[1].replace('jpeg', 'jpg');
            
            const fileItem = {
                id: fileId,
                name: file.name,
                originalFile: file,
                status: 'processing',
                convertedBlob: null,
                targetName: file.name.replace(/\.[^/.]+$/, "") + '.' + extension
            };

            filesArray.push(fileItem);
            renderFileItem(fileItem);

            try {
                const blob = await convertImage(file, targetFormat);
                fileItem.convertedBlob = blob;
                fileItem.status = 'done';
                updateFileItemUI(fileItem);
            } catch (err) {
                fileItem.status = 'error';
                updateFileItemUI(fileItem, err.message);
            }
        }
    }

    // 圖像轉換邏輯 (Canvas)
    function convertImage(file, format) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        if (blob) resolve(blob);
                        else reject(new Error('轉換失敗'));
                    }, format, 0.9);
                };
                img.onerror = () => reject(new Error('圖片讀取錯誤'));
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // UI 渲染：新增項目
    function renderFileItem(item) {
        const div = document.createElement('div');
        div.id = `item-${item.id}`;
        div.className = "bg-white p-4 rounded-lg shadow border flex items-center justify-between animate-fade-in";
        div.innerHTML = `
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-gray-100 rounded overflow-hidden flex items-center justify-center">
                    <span class="text-xs text-gray-400">讀取中</span>
                </div>
                <div>
                    <p class="font-medium text-gray-800 truncate w-48 md:w-64">${item.name}</p>
                    <p class="text-xs text-blue-500 status-text">正在轉換...</p>
                </div>
            </div>
            <div class="action-area">
                <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        `;
        fileList.prepend(div);
    }

    // UI 渲染：更新狀態
    function updateFileItemUI(item, errorMsg = '') {
        const el = document.getElementById(`item-${item.id}`);
        if (!el) return;

        const statusText = el.querySelector('.status-text');
        const actionArea = el.querySelector('.action-area');
        const imgContainer = el.querySelector('div > div');

        if (item.status === 'done') {
            statusText.textContent = `成功 -> ${item.targetName}`;
            statusText.classList.replace('text-blue-500', 'text-green-500');
            
            // 建立下載連結
            const url = URL.createObjectURL(item.convertedBlob);
            actionArea.innerHTML = `
                <a href="${url}" download="${item.targetName}" class="text-blue-600 hover:text-blue-800 font-medium">
                    下載
                </a>
            `;

            // 預覽圖
            const img = document.createElement('img');
            img.src = url;
            img.className = "object-cover w-full h-full";
            imgContainer.innerHTML = '';
            imgContainer.appendChild(img);

        } else if (item.status === 'error') {
            statusText.textContent = `失敗: ${errorMsg}`;
            statusText.classList.replace('text-blue-500', 'text-red-500');
            actionArea.innerHTML = `<span class="text-red-500">❌</span>`;
        }
    }

    // 批量下載 (ZIP)
    downloadAllBtn.addEventListener('click', async () => {
        const zip = new JSZip();
        let count = 0;

        filesArray.forEach(item => {
            if (item.status === 'done' && item.convertedBlob) {
                zip.file(item.targetName, item.convertedBlob);
                count++;
            }
        });

        if (count === 0) return;

        downloadAllBtn.textContent = '打包中...';
        downloadAllBtn.disabled = true;

        const content = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `converted_images_${new Date().getTime()}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        downloadAllBtn.textContent = '下載全部 (ZIP)';
        downloadAllBtn.disabled = false;
    });
</script>

</body>
</html>
